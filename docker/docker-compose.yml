# Vektör DB backend'leri (yerel geliştirme). Yalnızca kullandığınızı başlatın:
#   docker compose -f docker/docker-compose.yml up -d qdrant
#   docker compose -f docker/docker-compose.yml up -d weaviate
services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: arwenis-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.38.2
    container_name: arwenis-weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: unless-stopped

volumes:
  qdrant_data:
  weaviate_data:
